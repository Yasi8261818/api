<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 600;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #ccc;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .status {
            margin-top: 20px;
            font-weight: bold;
            display: none;
        }

        .download-btn-container {
            margin-top: 20px;
            display: none;
        }

        .final-download-btn {
            background: #2ed573;
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.3);
            text-decoration: none;
            display: inline-block;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Downloader</h1>
        <p>TikTok, YouTube, Instagram හෝ FB වීඩියෝ ලින්ක් එක පහතින් ඇතුළත් කරන්න.</p>
        
        <div class="input-area">
            <input type="text" id="videoLink" placeholder="ලින්ක් එක මෙතනට Paste කරන්න (e.g., https://...)">
            <button id="actionBtn" onclick="processVideo()">වීඩියෝව සකසන්න (Process)</button>
        </div>

        <div class="status" id="statusText">මඳක් රැඳී සිටින්න... ⏳</div>

        <div class="download-btn-container" id="downloadArea">
            <a href="#" id="downloadLink" class="final-download-btn" target="_blank">📥 වීඩියෝව බාගත කරගන්න (Download)</a>
        </div>

        <div class="footer">
            &copy; 2026 Free Video Downloader | Powered by Cobalt Production API
        </div>
    </div>

    <script>
        async function processVideo() {
            const urlInput = document.getElementById('videoLink').value.trim();
            const statusText = document.getElementById('statusText');
            const downloadArea = document.getElementById('downloadArea');
            const downloadLink = document.getElementById('downloadLink');
            const actionBtn = document.getElementById('actionBtn');

            if (!urlInput) {
                alert("කරුණාකර වලංගු වීඩියෝ ලින්ක් එකක් ඇතුළත් කරන්න!");
                return;
            }

            statusText.style.display = "block";
            statusText.innerText = "වීඩියෝව විශ්ලේෂණය කරමින් පවතී... ⏳";
            statusText.style.color = "#ffa500";
            downloadArea.style.display = "none";
            actionBtn.disabled = true;

            try {
                // දැනට පවතින සජීවී සහ නිල Cobalt පොදු API එකක් භාවිතය
                const response = await fetch('https://cobalt.perennialte.ch/api/json', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: urlInput,
                        vQuality: "720"
                    })
                });

                const data = await response.json();

                if (data && data.url) {
                    statusText.innerText = "සාර්ථකයි! වීඩියෝව සූදානම්. 🎉";
                    statusText.style.color = "#2ed573";
                    
                    downloadLink.href = data.url;
                    downloadArea.style.display = "block";
                } else {
                    statusText.innerText = "කණගාටුයි! වීඩියෝව සොයාගත නොහැකි විය. වෙනත් ලින්ක් එකක් උත්සාහ කරන්න.";
                    statusText.style.color = "#ff4757";
                }

            } catch (error) {
                console.error(error);
                statusText.innerText = "සර්වර් එක කාර්යබහුලයි. කරුණාකර නැවත උත්සාහ කරන්න!";
                statusText.style.color = "#ff4757";
            } finally {
                actionBtn.disabled = false;
            }
        }
    </script>

</body>
</html>
