<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 600;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #ccc;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .status {
            margin-top: 20px;
            font-weight: bold;
            display: none;
            color: #ffa500;
        }

        .download-btn-container {
            margin-top: 20px;
            display: none;
        }

        .final-download-btn {
            background: #2ed573;
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.3);
            text-decoration: none;
            display: inline-block;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Video Downloader</h1>
        <p>TikTok, YouTube Shorts හෝ Instagram ලින්ක් එකක් ඇතුළත් කරන්න.</p>
        
        <div class="input-area">
            <input type="text" id="videoLink" placeholder="ලින්ක් එක මෙතනට Paste කරන්න...">
            <button id="actionBtn" onclick="processVideo()">වීඩියෝව සකසන්න (Process)</button>
        </div>

        <div class="status" id="statusText">වීඩියෝව සූදානම් කරමින් පවතී... ⏳</div>

        <div class="download-btn-container" id="downloadArea">
            <a href="#" id="downloadLink" class="final-download-btn" target="_blank" rel="noreferrer">📥 වීඩියෝව බාගත කරගන්න (Download)</a>
        </div>

        <div class="footer">
            &copy; 2026 Free Video Downloader | Direct Stream Engine
        </div>
    </div>

    <script>
        function processVideo() {
            const urlInput = document.getElementById('videoLink').value.trim();
            const statusText = document.getElementById('statusText');
            const downloadArea = document.getElementById('downloadArea');
            const downloadLink = document.getElementById('downloadLink');

            if (!urlInput) {
                alert("කරුණාකර ලින්ක් එකක් ඇතුළත් කරන්න!");
                return;
            }

            statusText.style.display = "block";
            statusText.innerText = "වීඩියෝව සූදානම් කරමින් පවතී... ⏳";
            statusText.style.color = "#ffa500";
            downloadArea.style.display = "none";

            // කිසිදු බාහිර API එකක් නැතිව කෙලින්ම ඩවුන්ලෝඩ් සේවා ද්වාරයකට (Gateway) ලින්ක් එක යැවීම
            setTimeout(() => {
                let cleanUrl = urlInput.split('?')[0]; // ට්‍රැකින් කෝඩ් අයින් කිරීම
                let finalDownloadUrl = `https://www.ssstik.io/abc?url=${encodeURIComponent(cleanUrl)}`;
                
                // යූටියුබ් නම් වෙනත් සෘජු ගේට්වේ එකක් භාවිතය
                if(urlInput.includes("youtube.com") || urlInput.includes("youtu.be")) {
                    finalDownloadUrl = urlInput.replace("youtube.com", "youtubepp.com").replace("youtu.be", "youtubepp.com/watch?v=");
                } else if(urlInput.includes("tiktok.com")) {
                    finalDownloadUrl = `https://ssstik.io/en`; // ටික්ටොක් සඳහා සෘජු වෙබ් ටූල් එකට හැරවීම
                } else if(urlInput.includes("instagram.com")) {
                    finalDownloadUrl = `https://savefrom.net/?url=${encodeURIComponent(urlInput)}`;
                }

                statusText.innerText = "සාර්ථකයි! වීඩියෝව සූදානම්. 🎉";
                statusText.style.color = "#2ed573";
                
                downloadLink.href = finalDownloadUrl;
                downloadArea.style.display = "block";
            }, 1000);
        }
    </script>

</body>
</html>
