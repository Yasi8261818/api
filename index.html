<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Hub - GitHub Pages Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans">

    <header class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-cyan-400 flex items-center gap-2">
                <i class="fas fa-film"></i> Movie Hub
            </h1>
            <p class="text-xs text-gray-400">GitHub Pages Edition</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        
        <section class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">සිනමා පටයේ නම ඇතුලත් කරන්න</h2>
            <form id="searchForm" class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-4 top-4 text-gray-500"></i>
                    <input 
                        type="text" 
                        id="searchQuery" 
                        placeholder="उदा: Red Sonja, Avatar, KGF, 2024..." 
                        class="w-full bg-gray-950 border border-gray-700 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-cyan-500 transition-colors"
                        required
                    >
                </div>
                <button 
                    type="submit" 
                    class="bg-cyan-500 hover:bg-cyan-600 text-gray-950 font-bold px-6 py-3 rounded-xl transition-all duration-200 flex items-center justify-center gap-2"
                >
                    <i class="fas fa-search"></i> Search
                </button>
            </form>
        </section>

        <div id="statusMessage" class="text-center py-6 hidden">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full mb-2"></div>
            <p id="statusText" class="text-gray-400">Searching movies, please wait...</p>
        </div>

        <section id="movieResults" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </section>

    </main>

    <script>
        // ඔයාගේ Dashboard එකෙන් ගත්ත API Key එක
        const API_KEY = '90346ff775ff3ee92fe8a1118fc57b4d'; 
        
        // GitHub Pages වලදී බ්ලොක් වීම් නැති කිරීමට ක්‍රියා කරන පොදු Proxy එකක්
        const PROXY_URL = 'https://api.allorigins.win/raw?url=';
        const BASE_URL = 'https://apis.sadas.dev/api/v1/movie/sinhalasub/search';

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const query = document.getElementById('searchQuery').value.trim();
            if(!query) return;

            const resultsContainer = document.getElementById('movieResults');
            const statusMessage = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');

            resultsContainer.innerHTML = '';
            statusText.innerText = "ඩේටාබේස් එකෙන් සොයමින් පවතී...";
            statusMessage.classList.remove('hidden');

            // API Request එක Proxy එක හරහා සකස් කිරීම
            const finalUrl = `${PROXY_URL}${encodeURIComponent(`${BASE_URL}?q=${query}`)}`;

            fetch(finalUrl, {
                method: 'GET',
                headers: { 
                    'x-api-key': API_KEY
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Search request failed');
                return response.json();
            })
            .then(data => {
                statusMessage.classList.add('hidden');
                
                if (data && data.length > 0) {
                    data.forEach(movie => {
                        const movieTitle = movie.title || 'Untitled Movie';
                        const movieUrl = movie.link || '#'; 
                        const movieImg = movie.img || movie.image || 'https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=300';

                        const card = document.createElement('div');
                        card.className = 'bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden p-4 flex gap-4 hover:border-cyan-500/40 transition-all shadow-lg';
                        
                        card.innerHTML = `
                            <img src="${movieImg}" alt="${movieTitle}" class="w-24 h-36 object-cover rounded-xl bg-gray-850 flex-shrink-0 shadow-md">
                            <div class="flex flex-col justify-between flex-1 py-1">
                                <div>
                                    <h3 class="font-bold text-base text-gray-100 line-clamp-2 mb-1">${movieTitle}</h3>
                                    <span class="text-[10px] bg-cyan-500/10 text-cyan-400 px-2 py-0.5 rounded-md font-medium">
                                        <i class="fas fa-closed-captioning mr-1"></i> Sinhala Sub
                                    </span>
                                </div>
                                <div class="mt-3">
                                    <a href="${movieUrl}" target="_blank" class="inline-flex items-center gap-1.5 text-xs font-semibold text-emerald-400 hover:text-emerald-300 transition-colors">
                                        View Original Post <i class="fas fa-external-link-alt text-[10px]"></i>
                                    </a>
                                </div>
                            </div>
                        `;
                        resultsContainer.appendChild(card);
                    });
                } else {
                    showNoResults();
                }
            })
            .catch(error => {
                statusMessage.classList.add('hidden');
                showError();
                console.error(error);
            });
        });

        function showNoResults() {
            document.getElementById('movieResults').innerHTML = `
                <div class="col-span-full text-center py-12 bg-gray-900 rounded-2xl border border-gray-800">
                    <i class="fas fa-exclamation-circle text-gray-600 text-4xl mb-3"></i>
                    <p class="text-gray-400">එම නමින් කිසිදු සිනමා පටයක් හමු වූයේ නැත.</p>
                </div>`;
        }

        function showError() {
            document.getElementById('movieResults').innerHTML = `
                <div class="col-span-full text-center py-12 bg-gray-900 rounded-2xl border border-red-900/50">
                    <i class="fas fa-circle-xmark text-red-500 text-4xl mb-3"></i>
                    <p class="text-red-400">දෝෂයක් සිදු විය! කරුණාකර API Key එකෙහි වලංගුභාවය පරීක්ෂා කරන්න.</p>
                </div>`;
        }
    </script>
</body>
</html>
