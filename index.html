<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Hub - Advanced API Integration</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans">

    <header class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-cyan-400 flex items-center gap-2">
                <i class="fas fa-film"></i> Movie Hub
            </h1>
            <p class="text-xs text-gray-400">Sinhalasub API Pro</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        
        <section class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">සිනමා පටයේ නම ඇතුලත් කරන්න</h2>
            <form id="searchForm" class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-4 top-4 text-gray-500"></i>
                    <input 
                        type="text" 
                        id="searchQuery" 
                        placeholder="उदा: KGF Chapter 1, Avatar, Red Sonja..." 
                        class="w-full bg-gray-950 border border-gray-700 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-cyan-500 transition-colors"
                        required
                    >
                </div>
                <button 
                    type="submit" 
                    class="bg-cyan-500 hover:bg-cyan-600 text-gray-950 font-bold px-6 py-3 rounded-xl transition-all duration-200 flex items-center justify-center gap-2"
                >
                    <i class="fas fa-search"></i> Search
                </button>
            </form>
        </section>

        <div id="statusMessage" class="text-center py-6 hidden">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full mb-2"></div>
            <p id="statusText" class="text-gray-400">Searching Database...</p>
        </div>

        <section id="movieResults" class="grid grid-cols-1 gap-6">
            </section>

    </main>

    <script>
        // ⚠️ කන්ෆිගරේෂන් (ඔයාගේ අලුත් API Key එක මෙතනට දාන්න)
        const API_KEY = 'da32b993ffba4deaa26afe1f54036834'; 
        const BASE_URL = 'https://apis.sadas.dev/api/v1/movie/sinhalasub';

        // පියවර 1: පරිශීලකයා Search කරන විට ක්‍රියාත්මක වන කොටස
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const query = document.getElementById('searchQuery').value.trim();
            if(!query) return;

            const resultsContainer = document.getElementById('movieResults');
            const statusMessage = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');

            // UI එක සුද්ධ කිරීම
            resultsContainer.innerHTML = '';
            statusText.innerText = "Database එකෙන් සොයමින් පවතී...";
            statusMessage.classList.remove('hidden');

            // API එකට පළමු කෝල් එක (Search Call)
            fetch(`${BASE_URL}/search?q=${encodeURIComponent(query)}`, {
                method: 'GET',
                headers: { 
                    'x-api-key': API_KEY, 
                    'Accept': 'application/json' 
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Search request failed');
                return response.json();
            })
            .then(data => {
                statusMessage.classList.add('hidden');
                
                // දත්ත තිබේ නම් ඒවා Card එක බැගින් පෙන්වීම
                if (data && data.length > 0) {
                    data.forEach((movie, index) => {
                        const movieTitle = movie.title || 'Untitled Movie';
                        const movieUrl = movie.link || ''; 
                        const movieImg = movie.img || movie.image || 'https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=300';

                        const card = document.createElement('div');
                        card.className = 'bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-lg flex flex-col gap-4 hover:border-cyan-500/30 transition-all';
                        card.innerHTML = `
                            <div class="flex gap-4">
                                <img src="${movieImg}" alt="${movieTitle}" class="w-20 h-28 object-cover rounded-lg bg-gray-850 flex-shrink-0">
                                <div class="flex flex-col justify-center flex-1">
                                    <h3 class="font-bold text-base md:text-lg text-gray-100 line-clamp-2">${movieTitle}</h3>
                                    <p class="text-xs text-green-400 mt-1"><i class="fas fa-check-circle"></i> Sinhala Subtitles Detected</p>
                                </div>
                            </div>
                            
                            <div id="dl-section-${index}" class="mt-2 border-t border-gray-800 pt-4">
                                <button onclick="fetchDownloadOptions('${movieUrl}', ${index})" class="w-full bg-cyan-500 hover:bg-cyan-600 text-gray-950 font-bold py-2.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors">
                                    <i class="fas fa-cloud-download-alt"></i> Download Options බලන්න
                                </button>
                            </div>
                        `;
                        resultsContainer.appendChild(card);
                    });
                } else {
                    showNoResults();
                }
            })
            .catch(error => {
                statusMessage.classList.add('hidden');
                showError();
                console.error(error);
            });
        });

        // පියවර 2: "Download Options බලන්න" එබූ විට ඩේටාබේස් එකෙන් Links ඇදලා ගුණාත්මකභාවය (Quality) අනුව පෙන්වීම
        function fetchDownloadOptions(movieUrl, index) {
            const dlSection = document.getElementById(`dl-section-${index}`);
            
            // Loading සලකුණ පෙන්වීම
            dlSection.innerHTML = `
                <div class="text-center py-2 text-sm text-gray-400">
                    <div class="animate-spin inline-block w-4 h-4 border-2 border-cyan-500 border-t-transparent rounded-full mr-2 align-middle"></div>
                    Direct links ලබා ගනිමින් පවතී...
                </div>`;

            // API එකට දෙවැනි කෝල් එක (infodl Call)
            fetch(`${BASE_URL}/infodl?q=${encodeURIComponent(movieUrl)}`, {
                method: 'GET',
                headers: { 
                    'x-api-key': API_KEY, 
                    'Accept': 'application/json' 
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to fetch movie info');
                return response.json();
            })
            .then(data => {
                let htmlContent = `<div class="flex flex-col gap-2">`;
                
                // API එකෙන් එන links array එකක්ද කියා පරීක්ෂා කිරීම
                const linksList = Array.isArray(data) ? data : (data.links || []);

                if(linksList.length > 0) {
                    // voice message එකේ කිව්වා වගේ Quality (720p, 1080p) සහ සයිස් වෙන් වෙන්ව පෙන්වීම
                    linksList.forEach(item => {
                        const qualityLabel = item.quality || item.title || 'Download';
                        const fileSize = item.size ? `[${item.size}]` : '';
                        const finalDownloadUrl = item.link || item.url || '#';

                        htmlContent += `
                            <a href="${finalDownloadUrl}" target="_blank" class="bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold py-2.5 px-4 rounded-xl flex justify-between items-center text-sm transition-colors shadow-md">
                                <span><i class="fas fa-arrow-alt-circle-down mr-1"></i> ${qualityLabel} ${fileSize} - ඩවුන්ලෝඩ් කරන්න</span>
                                <i class="fas fa-external-link-alt text-xs"></i>
                            </a>`;
                    });
                } else if(data.link || data.download_link) {
                    // තනි ලින්ක් එකක් පමණක් ආවොත් ක්‍රියාත්මක වන කොටස
                    const singleLink = data.link || data.download_link;
                    htmlContent += `
                        <a href="${singleLink}" target="_blank" class="bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold py-2.5 px-4 rounded-xl flex items-center justify-center gap-2 text-sm transition-colors shadow-md">
                            <i class="fas fa-download"></i> Direct Download Movie
                        </a>`;
                } else {
                    htmlContent += `<p class="text-xs text-amber-400 text-center py-2"><i class="fas fa-exclamation-triangle"></i> Direct download links හමු නොවීය.</p>`;
                }

                htmlContent += `</div>`;
                dlSection.innerHTML = htmlContent;
            })
            .catch(error => {
                console.error(error);
                dlSection.innerHTML = `<p class="text-xs text-red-400 text-center py-2">ලින්ක් ලබා ගැනීමේදී දෝෂයක් සිදු විය. නැවත උත්සාහ කරන්න.</p>`;
            });
        }

        function showNoResults() {
            document.getElementById('movieResults').innerHTML = `
                <div class="text-center py-12 bg-gray-900 rounded-2xl border border-gray-800">
                    <i class="fas fa-database text-gray-600 text-4xl mb-3"></i>
                    <p class="text-gray-400">එම නමින් කිසිදු සිනමා පටයක් ඩේටාබේස් එකේ හමු වූයේ නැත.</p>
                </div>`;
        }

        function showError() {
            document.getElementById('movieResults').innerHTML = `
                <div class="text-center py-12 bg-gray-900 rounded-2xl border border-red-900/50">
                    <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-3"></i>
                    <p class="text-red-400">ජාල දෝෂයක් හෝ API Key එකෙහි ගැටළුවක් පවතී!</p>
                </div>`;
        }
    </script>
</body>
</html>
